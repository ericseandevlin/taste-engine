<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Glyphlab</title>
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:"Courier New",monospace;background:#111;color:#eaff00;line-height:1}
  .wrap{padding:0}
  header{display:flex;justify-content:space-between;padding:18px 24px;font-size:12px;text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid #eaff00}
  .stage{position:relative;height:560px;overflow:hidden}
  .big{position:absolute;font-weight:bold;text-transform:uppercase;letter-spacing:-.06em}
  .g1{font-size:340px;top:-60px;left:10px;color:#eaff00}
  .g2{font-size:200px;top:180px;right:30px;color:#111;-webkit-text-stroke:2px #eaff00;transform:rotate(-8deg)}
  .g3{font-size:120px;bottom:20px;left:30%;color:#ff00a8}
  .strip{display:flex;border-top:1px solid #eaff00;border-bottom:1px solid #eaff00;font-size:14px}
  .strip div{padding:14px 20px;border-right:1px solid #eaff00;white-space:nowrap}
  .spec{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#eaff00}
  .spec div{background:#111;padding:30px 24px}
  .spec .num{font-size:56px;color:#ff00a8}
  .spec .lab{font-size:12px;text-transform:uppercase;color:#eaff00;margin-top:10px}
</style></head>
<body><div class="wrap">
  <header><div>GLYPHLAB / TYPE FOUNDRY</div><div>Specimens — Licenses — Custom</div></header>
  <div class="stage"><div class="big g1">Aa</div><div class="big g2">Bg</div><div class="big g3">Qy</div></div>
  <div class="strip"><div>NEW RELEASE</div><div>GROTESK VOLT — 9 WEIGHTS</div><div>VARIABLE</div><div>TRY IN BROWSER →</div><div>LATIN / CYRILLIC</div></div>
  <div class="spec"><div><div class="num">47</div><div class="lab">Typefaces</div></div><div><div class="num">9</div><div class="lab">Weights each</div></div><div><div class="num">∞</div><div class="lab">Bad ideas tested</div></div></div>
</div></body></html>
