<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Monolith</title>
<style>
  *{margin:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:"Helvetica Neue",Arial,sans-serif;background:#e8e6e1;color:#1a1a1a;display:flex;flex-direction:column;min-height:100vh}
  header{display:flex;justify-content:space-between;padding:28px 36px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#555}
  main{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:40px}
  main .word{font-size:200px;font-weight:800;letter-spacing:-.05em;line-height:.9}
  main .sub{margin-top:24px;font-size:16px;letter-spacing:.04em;color:#444;max-width:34ch}
  footer{display:flex;justify-content:space-between;padding:28px 36px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#555}
</style></head>
<body>
  <header><div>Est. 2021</div><div>Menu</div></header>
  <main><div class="word">MONO&shy;LITH</div><div class="sub">An independent studio for brands that say one thing, clearly.</div></main>
  <footer><div>Scroll</div><div>Index — Studio — Contact</div></footer>
</body></html>
