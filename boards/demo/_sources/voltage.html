<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Voltage</title>
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:"Arial Black",Arial,sans-serif;background:#ff3b00;color:#0d0d0d;line-height:.96}
  .wrap{padding:32px 40px}
  header{display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.02em}
  header .pill{border:2px solid #0d0d0d;border-radius:999px;padding:8px 18px}
  .hero{padding:60px 0 40px}
  .hero h1{font-size:150px;font-weight:900;letter-spacing:-.04em;text-transform:uppercase}
  .hero h1 .o{-webkit-text-stroke:3px #0d0d0d;color:#ff3b00}
  .bar{display:flex;gap:0;border-top:4px solid #0d0d0d;border-bottom:4px solid #0d0d0d;margin-top:24px}
  .bar div{flex:1;padding:20px;font-size:14px;font-weight:700;text-transform:uppercase;border-right:4px solid #0d0d0d}
  .bar div:last-child{border-right:0}
  .grid{display:grid;grid-template-columns:2fr 1fr;gap:24px;margin-top:24px}
  .block{background:#0d0d0d;color:#ff3b00;padding:40px;min-height:280px;display:flex;flex-direction:column;justify-content:space-between}
  .block h2{font-size:48px;font-weight:900;text-transform:uppercase;letter-spacing:-.03em}
  .block.alt{background:#ffe600;color:#0d0d0d}
  .block p{font-family:Arial,sans-serif;font-size:14px;font-weight:400;line-height:1.4}
</style></head>
<body><div class="wrap">
  <header><div>VOLTAGE®</div><div class="pill">Let's make noise</div></header>
  <section class="hero"><h1>WE BUILD<br>L<span class="o">O</span>UD<br>BRANDS.</h1>
  <div class="bar"><div>Strategy</div><div>Identity</div><div>Motion</div><div>Campaigns</div></div></section>
  <section class="grid">
    <div class="block"><h2>Turn it up to eleven.</h2><p>Voltage is a brand studio for companies that refuse to be background noise. We make work you cannot scroll past.</p></div>
    <div class="block alt"><h2>04 awards</h2><p>D&AD, ADC, Type Directors Club, and one our mums framed.</p></div>
  </section>
</div></body></html>
